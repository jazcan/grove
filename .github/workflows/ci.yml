name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/grove
          SESSION_SECRET: ci-session-secret-minimum-32-chars
          CSRF_SECRET: ci-csrf-secret-min-16
          APP_URL: http://localhost:3000
      - run: npm audit --audit-level=high
